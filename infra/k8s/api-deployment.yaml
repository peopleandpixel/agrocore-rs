apiVersion: apps/v1
kind: Deployment
metadata:
  name: agrocore-api
  labels:
    app: agrocore-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agrocore-api
  template:
    metadata:
      labels:
        app: agrocore-api
    spec:
      containers:
      - name: api
        image: agrocore-api:latest
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          value: "mongodb://mongodb-service:27017"
        - name: DATABASE_NAME
          value: "agrocore"
        - name: NATS_URL
          value: "nats://nats-service:4222"
        - name: LISTEN_ADDR
          value: "0.0.0.0:3000"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: agrocore-api-service
spec:
  selector:
    app: agrocore-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
